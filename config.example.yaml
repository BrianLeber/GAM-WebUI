# cli:
#   # The integrated terminal passes commands through cli/validator.py.
#   # Only valid GAM commands are forwarded. Shell operators are rejected.
#   # Admin-tier users only. SSH is the escape hatch for anything beyond GAM.
#   enabled: false
#   # Paths that the validator will also explicitly block (belt and suspenders).
#   blocklist: []
